name: Database Backup

on:
  # Ejecutar diariamente a las 3:00 AM UTC (4:00 AM en España)
  schedule:
    - cron: '0 3 * * *'

  # Permitir ejecución manual desde GitHub Actions UI
  workflow_dispatch:

  # Opcional: Backup semanal los domingos a las 2:00 AM
  # schedule:
  #   - cron: '0 2 * * 0'

jobs:
  backup:
    name: Backup Supabase Database
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Link to Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_REF

      - name: Create database backup
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Crear directorio de backups
          mkdir -p backups/db

          # Generar timestamp
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="backups/db/backup_${TIMESTAMP}.sql"

          # Crear backup
          echo "🗄️ Creating database backup..."
          supabase db dump --linked > $BACKUP_FILE

          # Comprimir backup
          echo "🗜️ Compressing backup..."
          gzip $BACKUP_FILE

          # Guardar nombre del archivo para siguientes steps
          echo "BACKUP_FILE=${BACKUP_FILE}.gz" >> $GITHUB_ENV
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

      - name: Upload to S3
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Upload backup to S3
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
        run: |
          aws s3 cp $BACKUP_FILE s3://${{ secrets.S3_BACKUP_BUCKET }}/db-backups/backup_$TIMESTAMP.sql.gz
          echo "✅ Backup uploaded to S3"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ env.TIMESTAMP }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30  # Mantener backups por 30 días en GitHub

      - name: Get backup size
        id: backup_size
        run: |
          SIZE=$(du -h $BACKUP_FILE | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "📦 Backup size: $SIZE"

      - name: Notify on success (Slack)
        if: success() && ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Database backup completed successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Database Backup Successful*\n📦 Size: ${{ steps.backup_size.outputs.size }}\n🕒 Timestamp: ${{ env.TIMESTAMP }}\n🗄️ File: backup_${{ env.TIMESTAMP }}.sql.gz"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on failure (Slack)
        if: failure() && ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Database backup FAILED",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Database Backup Failed*\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on failure (Email - GitHub default)
        if: failure()
        run: |
          echo "::error::Database backup failed! Check the workflow logs for details."

      - name: Summary
        if: success()
        run: |
          echo "## 🎉 Backup Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $TIMESTAMP" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** backup_${TIMESTAMP}.sql.gz" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** ${{ steps.backup_size.outputs.size }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Retention:** 30 days (GitHub Artifacts)" >> $GITHUB_STEP_SUMMARY

          if [ ! -z "${{ secrets.S3_BACKUP_BUCKET }}" ]; then
            echo "- **S3 Location:** s3://${{ secrets.S3_BACKUP_BUCKET }}/db-backups/" >> $GITHUB_STEP_SUMMARY
          fi
